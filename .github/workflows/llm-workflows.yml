name: LLM Workflows

on:
  issues:
    types: [opened, labeled, reopened, closed]
  pull_request:
    types: [closed, labeled, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: llmaw-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch:
    uses: TomzxCode/llm-augmented-workflows/.github/workflows/dispatch.yml@generic-workflows
    secrets: inherit
